<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercicio final modulo 01</title>
  <link rel="stylesheet" href="css/styleExFinal.css">
</head>
<body>

    
  <header>
    <nav class="navbar">
      <h1>Meu Portfólio</h1>
      <ul>
        <li><a href="#home">Início</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#projetos">Projetos</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  
  <section id="home" class="hero">
    <h2>Olá, eu sou Gabriel 👋</h2>
    <p>Desenvolvedor em formação</p>
  </section>

  
  <section id="sobre" class="sobre">
    <h2>Sobre mim</h2>
    <p>Sou estudante de Análise e Desenvolvimento de Sistemas, focado em desenvolvimento web.</p>
  </section>

  
  <section id="projetos" class="projetos">
    <h2>Projetos</h2>
    <div class="grid">
      <div class="card">Projeto 1</div>
      <div class="card">Projeto 2</div>
      <div class="card">Projeto 3</div>
    </div>
  </section>

  
  <section class="habilidades">
    <h2>Habilidades</h2>
    <div class="tags">
      <span>HTML</span>
      <span>CSS</span>
      <span>JavaScript</span>
    </div>
  </section>

  
  <section id="contato" class="contato">
    <h2>Contato</h2>
    <form>
      <input type="text" placeholder="Nome" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Mensagem"></textarea>
      <button type="submit">Enviar</button>
    </form>
  </section>

</body>
</html>
