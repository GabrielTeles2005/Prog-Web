<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aula_06 Javascript</title>
  <link rel="stylesheet" href="css/stylesAula_06.css">
</head>
<body>

  <div class="container">
    <h1>Calculadora de Desconto</h1>

    <label>Nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome">

    <label>Preço do Produto (R$):</label>
    <input type="number" id="preco">

    <label>Percentual de Desconto (%):</label>
    <input type="number" id="desconto">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
  </div>

  <script src="js/scriptAula_06.js"></script>
</body>
</html>
